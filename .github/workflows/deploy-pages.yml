name: Deploy site to GitHub Pages

# The marketing site lives in clara-core, vendored here under core/site via
# git subtree. GitHub Actions only runs workflows at the repo root, so this
# root workflow builds the vendored site.

on:
  push:
    branches: [main]
    paths:
      - "core/site/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core/site
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: core/site/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-workspace

      - name: Build static export
        env:
          NEXT_PUBLIC_BASE_PATH: /clara-plane
        run: pnpm build

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: core/site/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
