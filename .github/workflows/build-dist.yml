name: Build dist

# Rebuilds dist/ from core/ on every push and commits it back if it changed,
# so the paste-ready dist/SKILL.md always matches the current core.

on:
  push:
    branches: [main]
    paths:
      - "core/**"
      - "package.json"
      - ".github/workflows/build-dist.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-dist-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install

      - name: Build dist
        run: npm run build

      - name: Commit dist if changed
        run: |
          if [ -n "$(git status --porcelain dist)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add dist
            git commit -m "build: refresh dist [skip ci]"
            git push
          else
            echo "dist unchanged"
          fi
